name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: "--bundles appimage"
          - platform: windows-latest
            args: "--bundles nsis"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin --bundles dmg"
          - platform: macos-latest
            args: "--target aarch64-apple-darwin --bundles dmg"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Tauri dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils libfuse2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install npm dependencies
        run: npm install

      - name: Build and upload Tauri artifacts
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "SSH-Buddy ${{ github.ref_name }}"
          releaseBody: "First SSH-Buddy pre-release. See docs/releases/v0.1.0.md for features, known limitations, security model, and install notes. Builds are unsigned; Windows and macOS may show OS trust warnings."
          releaseDraft: true
          prerelease: true
          args: ${{ matrix.args }}
          releaseAssetNamePattern: "SSH-Buddy-v[version]-[platform]-[arch][setup][ext]"
